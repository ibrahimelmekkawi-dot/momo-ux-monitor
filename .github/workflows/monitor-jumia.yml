name: JUMIA UX Monitor

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Run Jumia Monitor
        run: node monitor-jumia.js

      - name: Commit Jumia History
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add monitoring-history-jumia.csv
          git commit -m "Update Jumia monitoring history" || echo "No changes"
          git push
